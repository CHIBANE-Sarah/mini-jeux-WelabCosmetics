services:
  # Frontend Angular
  angular:
    image: node:20-alpine
    container_name: welab-angular
    working_dir: /var/www/frontend
    volumes:
      - ./frontend:/var/www/frontend
    ports:
      - "${ANGULAR_PORT:-4200}:4200"
    command: sh -c "apk add --no-cache bash && npm install -g @angular/cli@21 && npm install && ng serve --host 0.0.0.0 --poll=2000"
    networks:
      - welab-network

  # Backend Symfony
  symfony:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: ${USERNAME}
        UID: ${UID}
        EMAIL: ${EMAIL}
        NAME: ${NAME}
    container_name: welab-symfony
    volumes:
      - ./backend:/var/www/backend
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: "sqlite:////var/www/backend/var/data.db"
    networks:
      - welab-network

  # Serveur Nginx
  web:
    image: nginx:alpine
    container_name: welab-web
    ports:
      - "${SYMFONY_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www/backend
      - ./frontend:/var/www/frontend
      - ./default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - welab-network
    depends_on:
      - symfony
      - angular

networks:
  welab-network:
    driver: bridge