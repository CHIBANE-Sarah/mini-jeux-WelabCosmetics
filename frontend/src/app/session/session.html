<div class="container py-5">

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
      <span class="visually-hidden">Chargement...</span>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger text-center py-4">
    <i class="bi bi-exclamation-triangle-fill fs-1 d-block mb-3"></i>
    <h4>{{ error }}</h4>
    <button class="btn btn-primary mt-3" (click)="goBack()">Retour à l'accueil</button>
  </div>

  <div *ngIf="!isLoading && !error && session" class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
        <div class="card-header bg-primary text-white text-center py-4">
          <i class="bi bi-controller fs-1"></i>
          <!-- CORRECTION : titre au lieu de titreSession -->
          <h2 class="mb-0 mt-2">{{ session.titre }}</h2>
        </div>

        <div class="card-body p-4">
          <div class="row g-4">
            <div class="col-md-6">
              <div class="d-flex align-items-center p-3 bg-light rounded-3">
                <i class="bi bi-key fs-1 text-primary me-3"></i>
                <div>
                  <small class="text-muted d-block">Code de session</small>
                  <!-- CORRECTION : code au lieu de codeSession -->
                  <code class="fs-4 fw-bold">{{ session.code }}</code>
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="d-flex align-items-center p-3 bg-light rounded-3">
                <i class="bi bi-clock fs-1 text-success me-3"></i>
                <div>
                  <small class="text-muted d-block">Durée</small>
                  <span class="fs-4 fw-bold">{{ session.duree }} minutes</span>
                </div>
              </div>
            </div>

            <div class="col-md-12">
              <div class="d-flex align-items-center p-3 bg-light rounded-3">
                <i class="bi bi-person-circle fs-1 text-info me-3"></i>
                <div>
                  <small class="text-muted d-block">Créé par</small>
                  <span class="fs-5 fw-medium">{{ session.createur }}</span>
                </div>
              </div>
            </div>
          </div>

          <div class="d-flex justify-content-between mt-4 pt-3">
            <button class="btn btn-outline-secondary px-4" (click)="goBack()">
              <i class="bi bi-arrow-left"></i> Retour
            </button>
            <button class="btn btn-outline-primary px-4" (click)="copyCode()">
              <i class="bi bi-copy"></i> Copier le code
            </button>
            <button class="btn btn-success px-4">
              <i class="bi bi-play-fill"></i> Commencer les jeux
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
