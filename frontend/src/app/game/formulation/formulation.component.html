<div class="formulation-wrapper">

  <div class="top-bar">
    <div class="logo-area">
      <span class="logo-text">WE LAB <span class="logo-sub">COSMETIC</span></span>
    </div>
    <div style="display:flex; gap:0.75rem; align-items:center;">
      <!-- AJOUT : bouton abandonner -->
      <button *ngIf="score === null" class="btn-abandon-form" (click)="abandonner()">
        <i class="bi bi-skip-end me-1"></i> Abandonner
      </button>
      <div class="timer-badge">
        <i class="bi bi-clock"></i> {{ formattedTime }}
      </div>
    </div>
  </div>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <div *ngIf="!isLoading && score === null">
    <div class="page-title">
      <h2>Créez votre Sérum Hydratant</h2>
      <p>Sélectionnez les bons ingrédients pour chaque phase de la formulation</p>
    </div>

    <div class="categories-grid">
      <div *ngFor="let cat of categories" class="category-card">
        <h4 class="category-title" [ngClass]="getCatClass(cat)">{{ cat }}</h4>
        <div class="ingredients-list">
          <div *ngFor="let ing of ingredientsByCategory[cat]"
               class="ingredient-item"
               [class.selected]="isSelected(ing.id)"
               (click)="toggleIngredient(ing.id)">
            {{ ing.nom }}
          </div>
        </div>
      </div>
    </div>

    <div class="formula-section">
      <h4 class="formula-title">Votre Formule</h4>
      <div class="formula-grid">
        <div *ngFor="let cat of categories" class="formula-slot" [ngClass]="getSlotClass(cat)">
          <span class="slot-label">{{ cat }}</span>
          <div *ngFor="let ing of getSelectedForCategory(cat)" class="slot-item">
            {{ ing.nom }}
          </div>
        </div>
      </div>
      <div class="formula-actions">
        <button class="btn-reset" (click)="reset()">Réinitialiser</button>
        <button class="btn-validate" (click)="validate()"
                [disabled]="isValidating || selectedIds.length === 0">
          {{ isValidating ? 'Validation...' : 'Valider la formule' }}
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="score !== null" class="result-section text-center">
    <div class="result-card">
      <i class="bi bi-trophy-fill text-warning" style="font-size:3rem"></i>
      <h2 class="mt-3">Résultat Formulation</h2>
      <p class="score-display">{{ score }} / {{ total }}</p>
      <div class="corrections-list mt-3">
        <div *ngFor="let c of corrections"
             class="correction-item"
             [class.correct]="c.correct && c.selectionne"
             [class.wrong]="!c.correct && c.selectionne"
             [class.missed]="c.correct && !c.selectionne">
          <span>{{ c.nom }}</span>
          <span class="correction-badge">
            <span *ngIf="c.correct && c.selectionne">✓ Correct</span>
            <span *ngIf="!c.correct && c.selectionne">✗ Incorrect</span>
            <span *ngIf="c.correct && !c.selectionne">Manqué</span>
          </span>
        </div>
      </div>
      <button class="btn-validate mt-4" (click)="nextGame()">
        Voir les résultats <i class="bi bi-arrow-right ms-2"></i>
      </button>
    </div>
  </div>

</div>
