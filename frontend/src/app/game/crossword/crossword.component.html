<div class="crossword-wrapper">

  <div class="timer-badge">
    <i class="bi bi-clock"></i> {{ formattedTime }}
  </div>

  <!-- AJOUT : bouton abandonner -->
  <div *ngIf="!isLoading && score === null" style="position:absolute; top:20px; left:30px;">
    <button class="btn-abandon-cross" (click)="abandonner()">
      <i class="bi bi-skip-end me-1"></i> Abandonner
    </button>
  </div>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <div *ngIf="!isLoading && score === null" class="game-layout">

    <div class="grid-section">
      <div class="crossword-grid">
        <div *ngFor="let row of getRows()" class="grid-row">
          <div *ngFor="let col of getCols()"
               class="grid-cell"
               [class.black]="grid[row][col].isBlack"
               [class.white]="!grid[row][col].isBlack"
               [class.selected]="isSelected(row, col)"
               (click)="selectCell(row, col)">
            <span *ngIf="grid[row][col].number" class="cell-number">
              {{ grid[row][col].number }}
            </span>
            <input *ngIf="!grid[row][col].isBlack"
                   type="text"
                   maxlength="1"
                   class="cell-input"
                   [(ngModel)]="userInputs[row][col]"
                   (keydown)="onKeyInput($event, row, col)"
                   (click)="selectCell(row, col)" />
          </div>
        </div>
      </div>

      <div class="grid-actions">
        <button class="btn btn-primary px-4" (click)="validate()">
          Vérifier
        </button>
        <button class="btn btn-outline-secondary px-4" (click)="resetGrid()">
          Réinitialiser
        </button>
      </div>
    </div>

    <div class="definitions-section">
      <div class="definitions-card">
        <h5><i class="bi bi-book me-2"></i>Définitions</h5>
        <div class="def-group">
          <p class="def-label">HORIZONTAL</p>
          <div *ngFor="let word of horizontalWords" class="def-item">
            <span class="def-number">{{ word.number }}</span>
            <span class="def-text">{{ word.definition }}</span>
          </div>
        </div>
        <div class="def-group mt-3">
          <p class="def-label">VERTICAL</p>
          <div *ngFor="let word of verticalWords" class="def-item">
            <span class="def-number">{{ word.number }}</span>
            <span class="def-text">{{ word.definition }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="score !== null" class="result-section text-center">
    <div class="result-card">
      <i class="bi bi-trophy-fill text-warning" style="font-size:3rem"></i>
      <h2 class="mt-3">Résultat Mots Croisés</h2>
      <p class="score-display">{{ score }} / {{ total }}</p>
      <div class="corrections-list">
        <div *ngFor="let correction of corrections"
             class="correction-item"
             [class.correct]="correction.correct"
             [class.wrong]="!correction.correct">
          <span class="correction-word">{{ correction.motCorrect }}</span>
          <i [class]="correction.correct
            ? 'bi bi-check-circle-fill text-success'
            : 'bi bi-x-circle-fill text-danger'">
          </i>
        </div>
      </div>
      <button class="btn btn-primary btn-lg px-5 mt-4" (click)="nextGame()">
        Jeu suivant <i class="bi bi-arrow-right ms-2"></i>
      </button>
    </div>
  </div>

</div>
