<div class="login-screen">
  <div class="card login-card">
    <div class="card-header text-center">
      <h1 class="h3 fw-bold">WeLab Cosmetic</h1>
      <p class="text-muted mb-0">Espace Administrateur</p>
    </div>

    <div class="card-body">
      <h2 class="card-title text-center mb-4 fw-semibold">Connexion</h2>

      <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ errorMessage }}
      </div>

      <form (ngSubmit)="submit()" class="needs-validation" autocomplete="off">
        <div class="mb-3">
          <label for="login" class="form-label fw-medium">Identifiant</label>
          <input
            id="login"
            type="text"
            class="form-control form-control-lg"
            [(ngModel)]="login"
            name="login"
            required
            placeholder="admin"
          />
        </div>

        <div class="mb-4">
          <label for="password" class="form-label fw-medium">Mot de passe</label>
          <input
            id="password"
            type="password"
            class="form-control form-control-lg"
            [(ngModel)]="password"
            name="password"
            required
            placeholder="admin123"
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100 py-3 fw-medium"
          [disabled]="loading"
        >
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          {{ loading ? 'Connexion en cours...' : 'Se connecter' }}
        </button>
      </form>

      <div class="alert alert-light mt-4 small" role="alert">
        <i class="bi bi-info-circle-fill me-2"></i>
        <strong>Identifiants de test :</strong><br />
        Admin : <span class="fw-medium">admin / admin123</span><br />
        Joueur : <span class="fw-medium">joueur1 / joueur1</span>
      </div>
    </div>

    <div class="text-center mt-3 text-muted small">&copy; 2026 WeLab Cosmetic - Tous droits réservés</div>
  </div>
</div>
